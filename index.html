<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>물리학 I 심화 탐구: 2807 신지원</title>
    <style>
        body { 
            text-align: center; 
            background-color: #121212; 
            color: #fff; 
            font-family: 'Malgun Gothic', sans-serif; 
            margin: 0; 
            overflow: hidden; 
        }
        h2 { 
            margin-top: 15px; 
            color: #FFD700; 
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); 
            letter-spacing: 2px;
        }
        canvas { 
            background: #1e1e1e; 
            display: block; 
            margin: 10px auto; 
            border: 3px solid #444; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8); 
            border-radius: 8px; 
        }
        .info { font-size: 0.9em; color: #ccc; line-height: 1.6; margin-bottom: 20px;}
        .math-tag { 
            display: inline-block; background: #333; 
            padding: 3px 8px; border-radius: 4px; 
            color: #5bc0de; font-weight: bold; margin: 2px;
        }
    </style>
</head>
<body>

    <h2>물리학 I 교과연계 심화 시뮬레이션</h2>
    <div class="info">
        학번: 2807 이름: 신지원 | 
        <span class="math-tag">뉴턴 운동 제3법칙</span>
        <span class="math-tag">충격량 분산 모델 I = mv(1+e)/N</span>
        <span class="math-tag">2차원 측면/상하면 분해 반사</span>
    </div>

    <canvas id="myCanvas" width="960" height="540"></canvas>

<script>
    const canvas = document.getElementById("myCanvas");
    const ctx = canvas.getContext("2d");

    const paddleHeight = 15;
    const paddleWidth = 140;
    let paddleX = (canvas.width - paddleWidth) / 2;
    let lastPaddleX = paddleX; 

    const brickRowCount = 5;
    const brickColumnCount = 9;
    const brickWidth = 90;
    const brickHeight = 25;
    const brickPadding = 12;
    const brickOffsetTop = 50;
    const brickOffsetLeft = 35;

    let score = 0;
    let bricks = [];
    let particles = [];
    let balls = [];

    const damageScalingFactor = 0.35; 
    const ballMass = 1.2;              
    const paddleRestitution = 0.75;    

    for(let c=0; c<brickColumnCount; c++) {
        bricks[c] = [];
        for(let r=0; r<brickRowCount; r++) {
            let type = 1;
            let hp = 1.0;
            let restitution = 0.70; 
            let color = "#e0a96d";

            if(r === 0) { 
                type = 2; 
                hp = 3.5; 
                restitution = 0.92; 
                color = "#8a9a86"; 
            } else if(r === 1 || r === 2) {
                type = 3;
                hp = 2.0;
                restitution = 0.80; 
                color = "#4ba3a5";
            }

            let bX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
            let bY = (r * (brickHeight + brickPadding)) + brickOffsetTop;

            bricks[c][r] = { 
                x: bX, y: bY, 
                width: brickWidth, height: brickHeight,
                type: type, hp: hp, maxHp: hp,
                restitution: restitution, color: color,
                active: true 
            };
        }
    }

    class Ball {
        constructor(x, y, dx, dy, radius = 8) {
            this.x = x;
            this.y = y;
            this.dx = dx;
            this.dy = dy;
            this.radius = radius;
            this.mass = ballMass; 
            this.active = true;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = "#FFF";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#FFF";
            ctx.fill();
            ctx.shadowBlur = 0; 
            ctx.closePath();
        }

        update() {
            if(this.x + this.dx > canvas.width - this.radius || this.x + this.dx < this.radius) {
                this.dx = -this.dx;
            }
            if(this.y + this.dy < this.radius) {
                this.dy = -this.dy;
            }
            if(this.y + this.dy > canvas.height - this.radius) {
                this.active = false;
            }

            this.x += this.dx;
            this.y += this.dy;
        }
    }

    balls.push(new Ball(canvas.width / 2, canvas.height - 45, 4, -5));

    document.addEventListener("mousemove", mouseMoveHandler, false);
    function mouseMoveHandler(e) {
        const relativeX = e.clientX - canvas.getBoundingClientRect().left;
        if(relativeX > 0 && relativeX < canvas.width) {
            paddleX = relativeX - paddleWidth/2;
        }
    }

    function checkCircleRectCollision(ball, rect) {
        let closestX = Math.max(rect.x, Math.min(ball.x, rect.x + rect.width));
        let closestY = Math.max(rect.y, Math.min(ball.y, rect.y + rect.height));

        let distanceX = ball.x - closestX;
        let distanceY = ball.y - closestY;
        let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

        return distanceSquared < (ball.radius * ball.radius);
    }

    // [강화된 물리 알고리즘] 이중 충돌 분산 처리 + 좌우 옆면 벡터 반사 분해 시스템
    function handlePhysicsCollision() {
        for(let i = 0; i < balls.length; i++) {
            let b = balls[i];
            if(!b.active) continue;

            let collidedBricks = [];

            for(let c = 0; c < brickColumnCount; c++) {
                for(let r = 0; r < brickRowCount; r++) {
                    let brick = bricks[c][r];
                    if(brick.active && checkCircleRectCollision(b, brick)) {
                        collidedBricks.push(brick);
                    }
                }
            }

            if(collidedBricks.length === 0) continue;

            // 속도 벡터 변화량 추적을 위한 전 상태 저장
            const oldDx = b.dx;
            const oldDy = b.dy;
            const N = collidedBricks.length; 

            let avgRestitution = 0;
            collidedBricks.forEach(brick => avgRestitution += brick.restitution);
            avgRestitution /= N;

            // [핵심 기믹] 첫 번째 충돌 벽돌 기준으로 법선 방향(상하 면 vs 좌우 옆면) 판정
            let refBrick = collidedBricks[0];
            let closestX = Math.max(refBrick.x, Math.min(b.x, refBrick.x + refBrick.width));
            let closestY = Math.max(refBrick.y, Math.min(b.y, refBrick.y + refBrick.height));
            
            let diffX = Math.abs(b.x - closestX);
            let diffY = Math.abs(b.y - closestY);

            let totalImpulse = 0;

            if (diffX > diffY) {
                // [좌우 옆면 충돌인 경우]: x축 속도 벡터를 비탄성 반사
                b.dx = -avgRestitution * b.dx;
                totalImpulse = b.mass * Math.abs(b.dx - oldDx); // x축 충격량 산출
            } else {
                // [상하 윗면/아랫면 충돌인 경우]: y축 속도 벡터를 비탄성 반사
                b.dy = -avgRestitution * b.dy;
                totalImpulse = b.mass * Math.abs(b.dy - oldDy); // y축 충격량 산출
            }

            // 충격량 균등 분산 분배 적용
            let distributedImpulse = totalImpulse / N;

            collidedBricks.forEach(brick => {
                brick.hp -= (distributedImpulse * damageScalingFactor);

                if(brick.hp <= 0) {
                    brick.active = false;
                    score += brick.type * 10;

                    // 유실된 역학적 에너지를 추적하여 파티클 비산 속도 벡터에 대입
                    let lostEnergy = 0.5 * b.mass * ((Math.pow(oldDx,2)+Math.pow(oldDy,2)) - (Math.pow(b.dx,2)+Math.pow(b.dy,2)));
                    let particleCount = Math.min(Math.floor(Math.abs(lostEnergy) * 15), 35);
                    if(particleCount < 10) particleCount = 15; // 시각적 최소 파티클 보장
                    
                    spawnVisualParticles(brick.x + brick.width/2, brick.y + brick.height/2, brick.color, Math.abs(lostEnergy), particleCount);
                }
            });
        }
    }

    function spawnVisualParticles(x, y, color, energy, count) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x, y: y,
                dx: (Math.random() - 0.5) * (energy * 3.5 + 2),
                dy: (Math.random() - 0.5) * (energy * 3.5 + 2),
                radius: Math.random() * 3 + 2,
                color: color,
                alpha: 1,
                update: function() {
                    this.x += this.dx;
                    this.y += this.dy;
                    this.alpha -= 0.03; 
                },
                draw: function() {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.closePath();
                    ctx.restore();
                }
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for(let c=0; c<brickColumnCount; c++) {
            for(let r=0; r<brickRowCount; r++) {
                let b = bricks[c][r];
                if(b.active) {
                    ctx.beginPath();
                    ctx.roundRect(b.x, b.y, b.width, b.height, 4);
                    
                    ctx.save();
                    ctx.globalAlpha = Math.max(b.hp / b.maxHp, 0.25);
                    ctx.fillStyle = b.color;
                    ctx.fill();
                    ctx.restore();

                    if(b.type === 2) { 
                        ctx.strokeStyle = "#fff"; 
                        ctx.lineWidth = 1.5; 
                        ctx.stroke(); 
                    }
                    ctx.closePath();
                }
            }
        }

        ctx.beginPath();
        ctx.roundRect(paddleX, canvas.height-paddleHeight-10, paddleWidth, paddleHeight, 5);
        ctx.fillStyle = "#00BFFF";
        ctx.fill();
        ctx.closePath();

        handlePhysicsCollision();

        for(let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            if(p.alpha <= 0) {
                particles.splice(i, 1);
            } else {
                p.update();
                p.draw();
            }
        }

        for(let i = 0; i < balls.length; i++) {
            let b = balls[i];
            if(!b.active) { 
                balls.splice(i, 1); 
                i--; 
                continue; 
            }
            b.draw(); 
            b.update();

            if(b.y + b.dy > canvas.height - b.radius - paddleHeight - 10) {
                if(b.x > paddleX && b.x < paddleX + paddleWidth) {
                    let paddleVelocity = paddleX - lastPaddleX; 

                    let hitPoint = (b.x - (paddleX + paddleWidth/2)) / (paddleWidth/2);
                    let currentSpeed = Math.sqrt(b.dx*b.dx + b.dy*b.dy); 
                    let nextSpeed = currentSpeed * paddleRestitution; 

                    b.dx = (hitPoint * nextSpeed) + (paddleVelocity * 0.35); 
                    b.dy = -Math.sqrt(Math.max(Math.pow(currentSpeed, 2) - Math.pow(b.dx, 2), 16)); 
                }
            }
        }

        lastPaddleX = paddleX;

        if(balls.length === 0) {
            alert("GAME OVER! 물리 엔진 최종 획득 점수: " + score);
            document.location.reload();
            return;
        }

        requestAnimationFrame(draw);
    }

    draw();
</script>

</body>
</html>
